<div class="page-container">

  <div class="page-header">
    <mat-icon class="title-icon">casino</mat-icon>
    @if (session()) {
      <div class="quest-badge">
        <mat-icon>sports_esports</mat-icon>
        {{ session()!.displayName }}
      </div>
    }
    @if (quest()) {
      <div class="quest-badge">
        <mat-icon>menu_book</mat-icon>
        Q{{ quest()!.number }} — {{ quest()!.title }}
      </div>
    }
    <span class="spacer"></span>
    @if (saveError()) {
      <span class="save-error" matTooltip="Dernière sauvegarde échouée">
        <mat-icon>cloud_off</mat-icon>
      </span>
    } @else if (session()) {
      <span class="save-ok" matTooltip="Partie sauvegardée">
        <mat-icon>cloud_done</mat-icon>
      </span>
    }
    <button mat-stroked-button (click)="abandon()" [disabled]="saving()" matTooltip="Quitter sans sauvegarder">
      <mat-icon>close</mat-icon>
      Abandonner
    </button>
    <button mat-flat-button color="primary" (click)="endQuest()" [disabled]="saving()">
      @if (saving()) {
        <mat-spinner diameter="20"></mat-spinner>
      } @else {
        <mat-icon>flag</mat-icon>
        Fin de quête
      }
    </button>
  </div>

  <div class="board" [class.board-1]="heroes().length === 1"
                     [class.board-2]="heroes().length === 2"
                     [class.board-3]="heroes().length === 3"
                     [class.board-4]="heroes().length === 4">
    @for (hero of heroes(); track hero.id; let i = $index) {
      @if (liveStats()[i]) {
        <app-hero-card
          [hero]="hero"
          [liveState]="liveStats()[i]"
          [quest]="quest()"
          (hpChange)="changeHp(i, $event)"
          (spChange)="changeSp(i, $event)"
          (goldEntryAdd)="addGoldEntry(i, $event)"
          (goldEntryRemove)="removePendingEntry(i, $event)"
          (equipementAdd)="addEquipement(i, $event)"
          (equipementRemove)="removeEquipement(i, $event)"
        />
      }
    }
  </div>

</div>
